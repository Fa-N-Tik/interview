<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Симулятор собеседования | 10 профессий × 15 вопросов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #101f2c 0%, #0a151f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        /* главная карточка */
        .interview-card {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* шапка */
        .employer-header {
            background: #0f2c3b;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            color: white;
            border-bottom: 3px solid #ffb347;
        }

        .avatar {
            background: #ffb347;
            width: 60px;
            height: 60px;
            border-radius: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .employer-info h2 {
            font-size: 1.4rem;
            letter-spacing: -0.3px;
        }

        .employer-info p {
            font-size: 0.8rem;
            opacity: 0.85;
        }

        .badge-company {
            background: #1f5e7a;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            margin-top: 6px;
        }

        /* тело */
        .interview-body {
            padding: 24px 22px 32px;
            background: #fffefc;
        }

        /* прогресс */
        .progress-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 2px solid #e9edf2;
            padding-bottom: 12px;
        }

        .q-counter, .prof-badge {
            background: #eef2fa;
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .prof-badge {
            background: #fff0db;
            color: #b45f1b;
        }

        .question-box {
            background: #f9fbfd;
            border-radius: 28px;
            padding: 18px 20px;
            margin-bottom: 24px;
            border-left: 6px solid #ffb347;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            color: #0a2b38;
            line-height: 1.35;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 24px 0 20px;
        }

        .option-btn {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 100px;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #1f3b4a;
        }

        .option-btn:hover:not(:disabled) {
            background: #fff2e0;
            border-color: #ffb347;
            transform: translateX(4px);
        }

        .opt-letter {
            background: #eef2fa;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .option-btn.selected {
            background: #fffbee;
            border-color: #ffb347;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .feedback-comment {
            background: #f0f7fc;
            border-radius: 24px;
            padding: 14px 18px;
            margin: 16px 0 24px;
            border-left: 4px solid #ffb347;
            font-size: 0.9rem;
            color: #1e4c66;
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            background: #eef2f5;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-next {
            background: #1f5e7a;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-next:hover:not(:disabled) {
            background: #0f4a63;
            transform: translateY(-2px);
        }

        .btn-restart, .btn-back {
            background: white;
            border: 2px solid #cbdde9;
            color: #2a5f7a;
        }

        /* выбор профессий — сетка */
        .profession-selector {
            text-align: center;
            padding: 10px 0;
        }

        .prof-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
            margin: 24px 0;
        }

        .prof-card {
            background: #f1f6fa;
            border-radius: 28px;
            padding: 16px 12px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            border: 2px solid transparent;
        }

        .prof-card:hover {
            background: #fffbee;
            border-color: #ffb347;
            transform: scale(1.02);
        }

        .prof-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .prof-card strong {
            font-size: 0.9rem;
            display: block;
        }

        /* результаты */
        .result-container {
            text-align: center;
        }

        .mistakes-box, .advice-box {
            background: #fff6ed;
            border-radius: 28px;
            padding: 18px;
            text-align: left;
            margin: 18px 0;
        }

        .advice-box {
            background: #e0f0f7;
        }

        .mistakes-box ul, .advice-box ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        .mistakes-box li, .advice-box li {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* адаптация под мобильные */
        @media (max-width: 550px) {
            body {
                padding: 10px;
            }
            .interview-body {
                padding: 18px 16px 24px;
            }
            .question-text {
                font-size: 1.2rem;
            }
            .option-btn {
                padding: 12px 14px;
                font-size: 0.85rem;
            }
            .prof-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
            }
            .prof-card {
                padding: 12px 8px;
            }
            .prof-icon {
                font-size: 2rem;
            }
            .action-buttons button {
                padding: 10px 16px;
                font-size: 0.75rem;
            }
            .employer-header {
                padding: 16px 18px;
            }
            .avatar {
                width: 50px;
                height: 50px;
                font-size: 1.8rem;
            }
        }

        @media (max-width: 380px) {
            .prof-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
<div class="interview-card" id="appRoot">
    <div class="employer-header" id="dynamicHeader">
        <div class="avatar">🎯</div>
        <div class="employer-info">
            <h2>Карьерный симулятор</h2>
            <p>10 профессий · 15 каверзных вопросов · ИИ-рекрутер</p>
            <div class="badge-company">выбери специальность → честный фидбек</div>
        </div>
    </div>
    <div class="interview-body" id="dynamicContent">
        <!-- динамическая загрузка -->
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 10 ПРОФЕССИЙ + ГЕНЕРАТОР 15 ВОПРОСОВ ДЛЯ КАЖДОЙ (шаблонный + вариативный)
    // --------------------------------------------------------------
    const professions = {
        developer: { name: "Разработчик (Fullstack/Backend)", icon: "💻", color: "#2c7da0" },
        designer: { name: "UI/UX Дизайнер", icon: "🎨", color: "#e76f51" },
        marketer: { name: "Digital-маркетолог", icon: "📈", color: "#f4a261" },
        manager: { name: "Менеджер проектов", icon: "📋", color: "#2a9d8f" },
        analyst: { name: "Бизнес-аналитик", icon: "📊", color: "#8ecae6" },
        sales: { name: "Менеджер по продажам", icon: "🤝", color: "#e9c46a" },
        hr: { name: "HR-специалист", icon: "👥", color: "#e76f51" },
        accountant: { name: "Бухгалтер", icon: "🧾", color: "#287271" },
        lawyer: { name: "Юрист", icon: "⚖️", color: "#9c89b8" },
        logistician: { name: "Логист / Снабженец", icon: "🚚", color: "#f08080" }
    };

    // Банк универсальных шаблонов вопросов (основа для генерации 15)
    const questionTemplates = [
        { text: "Расскажите о себе. Почему мы должны выбрать вас на позицию {prof}?",
          options: [
            { text: "Я быстро учусь, ответственный, готов работать за небольшие деньги.", feedback: "⚠️ Звучит неуверенно, обесценивает себя.", quality: "bad", scoreDelta: 0 },
            { text: "У меня есть опыт/проекты в {prof}. Я принесу пользу и готов развиваться.", feedback: "✅ Отлично, конкретно и уверенно.", quality: "good", scoreDelta: 2 },
            { text: "Всё в резюме написано, я обычный кандидат.", feedback: "❌ Пассивно, упущен шанс.", quality: "bad", scoreDelta: -1 }
          ] },
        { text: "Почему вы хотите работать именно в нашей компании?",
          options: [
            { text: "Нужны деньги, у вас платят больше.", feedback: "❌ Мотивация только деньгами.", quality: "bad", scoreDelta: -2 },
            { text: "Меня привлекают ваши проекты и корпоративная культура, хочу расти.", feedback: "💡 Отлично, показали интерес.", quality: "good", scoreDelta: 2 },
            { text: "Вы прислали приглашение, откликаюсь везде.", feedback: "⚠️ Массовая рассылка — плохо.", quality: "bad", scoreDelta: -2 }
          ] },
        { text: "Назовите ваши главные слабые стороны.",
          options: [
            { text: "Я перфекционист и слишком много работаю.", feedback: "🎭 Шаблонно, но безопасно.", quality: "neutral", scoreDelta: 0 },
            { text: "Мне не хватает опыта в некоторых инструментах, но я быстро учусь (курсы).", feedback: "✅ Саморефлексия + план.", quality: "good", scoreDelta: 2 },
            { text: "Я ленивый и не люблю команду.", feedback: "🚨 КРАСНЫЙ ФЛАГ!", quality: "bad", scoreDelta: -4 }
          ] },
        { text: "Где вы видите себя через 3 года?",
          options: [
            { text: "Не знаю, возможно, в другой сфере.", feedback: "❌ Нет лояльности.", quality: "bad", scoreDelta: -2 },
            { text: "Стану экспертом, буду развивать продукты компании и растить коллег.", feedback: "✨ Сильный ответ с привязкой.", quality: "good", scoreDelta: 2 },
            { text: "Хочу повышение и высокий доход.", feedback: "👍 Неплохо, но лучше связать с компанией.", quality: "neutral", scoreDelta: 1 }
          ] },
        { text: "Как вы справляетесь со стрессом и критикой?",
          options: [
            { text: "Сильно переживаю, могу расплакаться.", feedback: "⚠️ Низкая стрессоустойчивость.", quality: "bad", scoreDelta: -1 },
            { text: "Воспринимаю критику как зону роста, анализирую и улучшаю.", feedback: "✅ Взрослая позиция.", quality: "good", scoreDelta: 2 },
            { text: "Игнорирую критику, делаю по-своему.", feedback: "❌ Токсично.", quality: "bad", scoreDelta: -2 }
          ] },
        { text: "Почему у вас был перерыв в учёбе/работе?",
          options: [
            { text: "Путешествовал, искал себя.", feedback: "🧳 Приемлемо, но нет навыков.", quality: "neutral", scoreDelta: 0 },
            { text: "Семейные обстоятельства, но я прошел курсы и готов к работе.", feedback: "💪 Хорошее объяснение.", quality: "good", scoreDelta: 1 },
            { text: "Не ваше дело.", feedback: "🤯 Агрессия — отказ.", quality: "bad", scoreDelta: -3 }
          ] },
        { text: "Как вы работаете с большим объёмом задач и дедлайнами?",
          options: [
            { text: "Теряюсь и перегораю.", feedback: "⚠️ Проблемы с тайм-менеджментом.", quality: "bad", scoreDelta: -1 },
            { text: "Использую приоритизацию, Agile, веду трекер задач.", feedback: "✅ Профессиональный подход.", quality: "good", scoreDelta: 2 },
            { text: "Работаю сверхурочно, но без системы.", feedback: "🤔 Риск выгорания.", quality: "neutral", scoreDelta: 0 }
          ] },
        { text: "Расскажите о вашем самом сильном профессиональном достижении в {prof}.",
          options: [
            { text: "Пока нет достижений, я только учусь.", feedback: "⚠️ Слабо, но честно.", quality: "neutral", scoreDelta: -1 },
            { text: "Реализовал проект, который сэкономил 20% времени (или повысил метрики).", feedback: "🔥 Отлично, цифры и пример!", quality: "good", scoreDelta: 2 },
            { text: "Не могу вспомнить конкретики.", feedback: "❌ Неподготовленность.", quality: "bad", scoreDelta: -1 }
          ] },
        { text: "Как вы обучаетесь новым технологиям/трендам в {prof}?",
          options: [
            { text: "Не обучаюсь, мне хватает знаний.", feedback: "❌ Застой, минус.", quality: "bad", scoreDelta: -2 },
            { text: "Читаю проф. блоги, прохожу курсы, участвую в вебинарах.", feedback: "✅ Постоянное развитие — плюс.", quality: "good", scoreDelta: 2 },
            { text: "Иногда смотрю туториалы.", feedback: "👍 Приемлемо, но не системно.", quality: "neutral", scoreDelta: 0 }
          ] },
        { text: "Что для вас важнее: результат или процесс?",
          options: [
            { text: "Только результат, любой ценой.", feedback: "⚠️ Риск неэтичного поведения.", quality: "bad", scoreDelta: -1 },
            { text: "Баланс, но результат — главная цель для бизнеса.", feedback: "💪 Зрелая позиция.", quality: "good", scoreDelta: 1 },
            { text: "Процесс расслабляет, результат не важен.", feedback: "❌ Не подходит для бизнеса.", quality: "bad", scoreDelta: -2 }
          ] },
        { text: "Расскажите о конфликте с коллегой, как его решили?",
          options: [
            { text: "Избегал конфликта, ушёл в себя.", feedback: "⚠️ Пассивность.", quality: "bad", scoreDelta: -1 },
            { text: "Выслушал, нашел компромисс, обсудили конструктивно.", feedback: "✅ Отличные софт-скиллы.", quality: "good", scoreDelta: 2 },
            { text: "Обратился к начальству, чтобы наказали оппонента.", feedback: "❌ Неумение решать конфликты.", quality: "bad", scoreDelta: -2 }
          ] },
        { text: "Почему вы решили стать специалистом в области {prof}?",
          options: [
            { text: "Случайно, просто так получилось.", feedback: "🤔 Слабая мотивация.", quality: "bad", scoreDelta: 0 },
            { text: "Мне нравится решать сложные задачи в {prof}, это моё призвание.", feedback: "🔥 Страсть к делу!", quality: "good", scoreDelta: 2 },
            { text: "Хочу зарабатывать деньги и стабильность.", feedback: "⚠️ Нормально, но без огонька.", quality: "neutral", scoreDelta: 0 }
          ] },
        { text: "Как вы относитесь к работе в выходные / переработкам?",
          options: [
            { text: "Категорически против.", feedback: "⚠️ Может быть минусом в стартапе.", quality: "neutral", scoreDelta: -1 },
            { text: "Готов, если это редкий форс-мажор и компенсируется.", feedback: "✅ Адекватный баланс.", quality: "good", scoreDelta: 1 },
            { text: "Всегда остаюсь допоздна, без дополнительной оплаты.", feedback: "❌ Риск выгорания и неумение планировать.", quality: "bad", scoreDelta: -1 }
          ] },
        { text: "Ваши ожидания по зарплате (для позиции {prof})?",
          options: [
            { text: "Минимальные, лишь бы взяли.", feedback: "⚠️ Неуверенность, вас могут недооценить.", quality: "bad", scoreDelta: -1 },
            { text: "Ориентируюсь на рынок и свои навыки: X руб. (гибкость).", feedback: "✅ Профессионально.", quality: "good", scoreDelta: 1 },
            { text: "Огромные суммы без обоснования.", feedback: "❌ Нереалистично.", quality: "bad", scoreDelta: -2 }
          ] },
        { text: "Что вы знаете о нашей компании? (вопрос на подготовку)",
          options: [
            { text: "Ничего, не готовился.", feedback: "❌ Плохо, отсутствие интереса.", quality: "bad", scoreDelta: -2 },
            { text: "Изучил сайт, последние новости, понимаю ценности.", feedback: "💡 Великолепно! Готовность.", quality: "good", scoreDelta: 2 },
            { text: "Что-то слышал мельком.", feedback: "🤔 Слабо.", quality: "neutral", scoreDelta: 0 }
          ] }
    ];

    // гарантированно 15 вопросов (обрезаем/дополняем)
    function generateQuestionsForProfession(profKey) {
        const profName = professions[profKey].name;
        let questions = [];
        // берем первые 15 шаблонов (всего 15)
        for (let i = 0; i < questionTemplates.length; i++) {
            const tmpl = questionTemplates[i];
            const questionText = tmpl.text.replace(/{prof}/g, profName);
            const options = tmpl.options.map(opt => ({
                text: opt.text.replace(/{prof}/g, profName),
                feedback: opt.feedback,
                quality: opt.quality,
                scoreDelta: opt.scoreDelta
            }));
            questions.push({ text: questionText, options });
        }
        // ровно 15 вопросов (template.length = 15, значит ок)
        return questions;
    }

    // -------------------- Состояние приложения --------------------
    let selectedProfessionKey = null;   // developer, designer ...
    let currentQuestionIndex = 0;
    let answers = [];                  // массив индексов ответов
    let interviewFinished = false;
    let currentQuestionsList = [];     // массив вопросов для выбранной профессии

    // Функция отрисовки выбора профессий
    function renderProfessionSelector() {
        const headerDiv = document.getElementById("dynamicHeader");
        headerDiv.innerHTML = `
            <div class="avatar">🎯</div>
            <div class="employer-info">
                <h2>Выберите профессию</h2>
                <p>10 направлений · по 15 каверзных вопросов</p>
                <div class="badge-company">симулятор реального собеседования</div>
            </div>
        `;
        let profHtml = `<div class="profession-selector"><div class="prof-grid">`;
        for (const [key, value] of Object.entries(professions)) {
            profHtml += `
                <div class="prof-card" data-prof="${key}">
                    <div class="prof-icon">${value.icon}</div>
                    <strong>${value.name}</strong>
                </div>
            `;
        }
        profHtml += `</div><button id="resetDefault" class="btn-restart">🔄 Сброс</button></div>`;
        document.getElementById("dynamicContent").innerHTML = profHtml;

        document.querySelectorAll('.prof-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const prof = card.dataset.prof;
                startInterview(prof);
            });
        });
        document.getElementById('resetDefault')?.addEventListener('click', () => location.reload());
    }

    function startInterview(profKey) {
        selectedProfessionKey = profKey;
        currentQuestionsList = generateQuestionsForProfession(profKey);
        answers = new Array(currentQuestionsList.length).fill(undefined);
        currentQuestionIndex = 0;
        interviewFinished = false;
        // обновить шапку
        const prof = professions[profKey];
        const header = document.getElementById("dynamicHeader");
        header.innerHTML = `
            <div class="avatar">${prof.icon}</div>
            <div class="employer-info">
                <h2>Собеседование: ${prof.name}</h2>
                <p>15 вопросов от строгого HR</p>
                <div class="badge-company">каверзный режим</div>
            </div>
        `;
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        if (interviewFinished) {
            renderResult();
            return;
        }
        const q = currentQuestionsList[currentQuestionIndex];
        const isAnswered = answers[currentQuestionIndex] !== undefined;
        const selectedIdx = answers[currentQuestionIndex];

        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            const selectedClass = (selectedIdx === idx) ? 'selected' : '';
            const disabledAttr = isAnswered ? 'disabled' : '';
            optionsHtml += `
                <div class="option-btn ${selectedClass}" data-opt-index="${idx}" ${disabledAttr}>
                    <span class="opt-letter">${letter}</span>
                    <span>${escapeHtml(opt.text)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isAnswered) {
            const selectedOpt = q.options[selectedIdx];
            feedbackHtml = `<div class="feedback-comment">💬 ${escapeHtml(selectedOpt.feedback)}</div>`;
        } else {
            feedbackHtml = `<div class="feedback-comment">🤔 Выберите вариант — HR даст моментальную обратную связь</div>`;
        }

        const nextDisabled = !isAnswered;
        const isLast = currentQuestionIndex === currentQuestionsList.length - 1;
        const nextBtnText = isLast ? "🏁 Завершить собеседование" : "➡️ Следующий вопрос";

        const html = `
            <div class="progress-area">
                <div class="q-counter">Вопрос ${currentQuestionIndex+1} / ${currentQuestionsList.length}</div>
                <div class="prof-badge">${professions[selectedProfessionKey].icon} ${professions[selectedProfessionKey].name}</div>
            </div>
            <div class="question-box">
                <div class="question-text">${escapeHtml(q.text)}</div>
            </div>
            <div class="options-list" id="optionsList">
                ${optionsHtml}
            </div>
            ${feedbackHtml}
            <div class="action-buttons">
                <button id="prevBtn" class="btn-restart" ${currentQuestionIndex === 0 ? 'disabled' : ''}>◀ Назад</button>
                <button id="nextBtn" class="btn-next" ${nextDisabled ? 'disabled' : ''}>${nextBtnText}</button>
                <button id="resetToProfessions" class="btn-restart">🏠 Сменить профессию</button>
            </div>
        `;
        document.getElementById("dynamicContent").innerHTML = html;

        // Обработка выбора вариантов
        if (!isAnswered) {
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.optIndex);
                    if (!isNaN(idx) && answers[currentQuestionIndex] === undefined) {
                        answers[currentQuestionIndex] = idx;
                        renderCurrentQuestion();
                    }
                });
            });
        }

        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                    renderCurrentQuestion();
                }
            });
        }
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (answers[currentQuestionIndex] !== undefined) {
                    if (currentQuestionIndex + 1 < currentQuestionsList.length) {
                        currentQuestionIndex++;
                        renderCurrentQuestion();
                    } else {
                        interviewFinished = true;
                        renderResult();
                    }
                }
            });
        }
        const resetBtn = document.getElementById('resetToProfessions');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => resetToProfessionChoice());
        }
    }

    function resetToProfessionChoice() {
        selectedProfessionKey = null;
        currentQuestionsList = [];
        answers = [];
        interviewFinished = false;
        currentQuestionIndex = 0;
        renderProfessionSelector();
        const headerDiv = document.getElementById("dynamicHeader");
        headerDiv.innerHTML = `
            <div class="avatar">🎯</div>
            <div class="employer-info">
                <h2>Карьерный симулятор</h2>
                <p>10 профессий · 15 каверзных вопросов · ИИ-рекрутер</p>
                <div class="badge-company">выбери специальность → честный фидбек</div>
            </div>
        `;
    }

    function calculateScoreAndMistakes() {
        let totalScore = 0;
        let mistakes = [];
        let goodPoints = [];
        for (let i = 0; i < answers.length; i++) {
            const ansIdx = answers[i];
            if (ansIdx !== undefined && currentQuestionsList[i] && currentQuestionsList[i].options[ansIdx]) {
                const opt = currentQuestionsList[i].options[ansIdx];
                totalScore += opt.scoreDelta;
                if (opt.quality === "bad") {
                    mistakes.push(`❌ Вопрос ${i+1}: «${currentQuestionsList[i].text.slice(0, 65)}...» — ${opt.feedback}`);
                } else if (opt.quality === "good") {
                    goodPoints.push(`✅ Вопрос ${i+1}: ${opt.feedback.substring(0, 100)}`);
                }
            }
        }
        const maxPossible = 30;   // примерный диапазон
        const minPossible = -40;
        let percent = 50;
        if (maxPossible - minPossible > 0) {
            let normalized = (totalScore - minPossible) / (maxPossible - minPossible);
            percent = Math.min(100, Math.max(0, Math.round(normalized * 100)));
        }
        return { totalScore, mistakes, goodPoints, percent };
    }

    function renderResult() {
        const { mistakes, goodPoints, percent } = calculateScoreAndMistakes();
        let verdict = "", icon = "";
        if (percent >= 70) {
            verdict = "🏆 Отлично! Вы готовы к реальному собеседованию";
            icon = "🎉";
        } else if (percent >= 45) {
            verdict = "📈 Хорошо, но есть типичные ошибки";
            icon = "⚠️";
        } else {
            verdict = "😓 Собеседование провалено. Разбираем ошибки";
            icon = "🔥";
        }
        const profName = professions[selectedProfessionKey]?.name || "специалиста";
        let mistakesHtml = mistakes.length ? `<ul>${mistakes.map(m => `<li>${escapeHtml(m)}</li>`).join('')}</ul>` : '<p>✅ Критических ошибок нет, но всегда есть куда расти.</p>';
        let goodHtml = goodPoints.length ? `<div style="background:#e2f3e6; border-radius: 20px; padding: 12px; margin-top: 14px;"><strong>✅ Ваши сильные стороны:</strong><ul>${goodPoints.map(g => `<li>${escapeHtml(g)}</li>`).join('')}</ul></div>` : '';
        const resultHtml = `
            <div class="result-container">
                <div class="result-icon">${icon}</div>
                <div class="result-title">${verdict}</div>
                <div class="result-percent">Оценка: ${percent}% (на основе каверз-баллов)</div>
                <div class="mistakes-box">
                    <h3>🔍 Разбор ошибок и «красных флагов»</h3>
                    ${mistakesHtml}
                </div>
                <div class="advice-box">
                    <h3>💡 Как улучшить результат (${profName})</h3>
                    <ul>
                        <li>📌 Конкретика: приводите примеры проектов, цифры.</li>
                        <li>📌 Избегайте фраз «не знаю», «деньги», агрессии.</li>
                        <li>📌 Готовьтесь к вопросам о слабостях — показывайте развитие.</li>
                        <li>📌 Изучайте компанию перед интервью.</li>
                    </ul>
                    ${goodHtml}
                </div>
                <div class="action-buttons" style="justify-content: center; margin-top: 20px;">
                    <button id="restartSameProf" class="btn-next">🔄 Повторить с этой же профессией</button>
                    <button id="changeProf" class="btn-restart">📋 Выбрать другую профессию</button>
                </div>
            </div>
        `;
        document.getElementById("dynamicContent").innerHTML = resultHtml;
        document.getElementById('restartSameProf')?.addEventListener('click', () => startInterview(selectedProfessionKey));
        document.getElementById('changeProf')?.addEventListener('click', () => resetToProfessionChoice());
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    // Инициализация
    renderProfessionSelector();
</script>
</body>
</html>
